<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | BLACK X ORIGINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige: #F2EFEA;
            --peach: #D9A88C;
            --black: #000000;
            --gray: #666;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--beige);
            font-family: 'Montserrat', sans-serif;
            color: var(--black);
            overflow-x: hidden;
        }
        .wrapper {
            min-height: 100vh;
            position: relative;
            padding: 22px 34px 0;
            box-sizing: border-box;
            overflow: hidden;
        }
        .wrapper::before {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 64%;
            height: 42%;
            background: var(--peach);
            z-index: 0;
        }
        .home-logo {
            position: absolute;
            top: 18px;
            left: 34px;
            color: var(--black);
            text-decoration: none;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -1px;
            z-index: 3;
            transition: opacity 0.3s;
        }
        .home-logo:hover {
            opacity: 0.65;
        }
        .header {
            text-align: center;
            position: relative;
            z-index: 2;
            padding-top: 34px;
            margin-bottom: 42px;
        }
        .header h1 {
            font-size: clamp(3.4rem, 8vw, 6.4rem);
            margin: 0;
            letter-spacing: -3px;
            line-height: 0.95;
        }
        .main-content {
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            position: relative;
            z-index: 2;
        }
        .contact-card {
            display: grid;
            grid-template-columns: minmax(260px, 410px) 220px;
            gap: 60px;
            align-items: start;
            background: var(--beige);
            border: 1px solid var(--black);
            padding: 50px 62px;
            width: 100%;
            max-width: 900px;
            min-height: 236px;
            box-sizing: border-box;
        }
        .form-group {
            margin-bottom: 26px;
        }
        input, textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--black);
            background: transparent;
            padding: 8px 0 12px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--black);
            color: white;
            border: none;
            border-radius: 30px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0;
        }
        button:hover {
            opacity: 0.8;
        }
        .contact-info {
            margin-top: 0;
            font-size: 15px;
            line-height: 1.45;
        }
        .info-block {
            margin-bottom: 34px;
        }
        .info-title {
            font-size: 1.55rem;
            line-height: 1.1;
            margin-bottom: 6px;
        }
        .info-text {
            color: #333;
        }
        .socials {
            margin-top: 6px;
            display: flex;
            gap: 30px;
        }
        .socials a {
            color: var(--black);
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
            text-transform: uppercase;
        }
        .fashion-image {
            position: absolute;
            bottom: 0;
            left: 34px;
            width: min(610px, 62vw);
            height: 42vh;
            min-height: 250px;
            z-index: 1;
            overflow: hidden;
        }
        .fashion-image img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center 28%;
            filter: grayscale(8%);
        }
        #response-msg {
            grid-column: 1 / -1;
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
        }
        @media (max-width: 900px) {
            .wrapper {
                padding: 22px;
                overflow: visible;
            }
            .wrapper::before {
                width: 100%;
                height: 290px;
            }
            .home-logo { left: 22px; }
            .header {
                padding-top: 52px;
                margin-bottom: 28px;
                text-align: left;
            }
            .header h1 {
                font-size: clamp(3rem, 16vw, 4.8rem);
                letter-spacing: -2px;
            }
            .main-content { justify-content: center; }
            .contact-card {
                grid-template-columns: 1fr;
                gap: 34px;
                padding: 30px 24px;
            }
            .fashion-image {
                position: relative;
                left: auto;
                width: calc(100% + 44px);
                height: 300px;
                margin: 28px -22px 0;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <a href="index.html" class="home-logo" aria-label="Go back to home page">Black X Original</a>

        <div class="header">
            <h1>Contact Us Page</h1>
        </div>

        <div class="main-content">
            <div class="contact-card">
                <form id="contactForm">
                    <div class="form-group">
                        <input type="text" id="name" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" placeholder="E-mail" required>
                    </div>
                    <div class="form-group">
                        <textarea id="message" rows="1" placeholder="Message" required></textarea>
                    </div>
                    <button type="submit">Contact Us</button>
                </form>

                <div class="contact-info">
                    <div class="info-block">
                        <div class="info-title">Contact</div>
                        <div class="info-text">hi@fashion.com</div>
                    </div>
                    <div class="info-block">
                        <div class="info-title">Based in</div>
                        <div class="info-text">San Francisco,<br>California</div>
                    </div>
                    <div class="socials">
                        <a href="#" aria-label="Facebook">f</a>
                        <a href="#" aria-label="Instagram">ig</a>
                        <a href="#" aria-label="Twitter">x</a>
                    </div>
                </div>
                <div id="response-msg"></div>
            </div>
        </div>

        <div class="fashion-image">
            <img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&w=800&q=80" alt="Fashion Models">
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('response-msg');
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: 'Contact page message',
                message: document.getElementById('message').value
            };

            try {
                const res = await fetch('http://localhost:3000/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const result = await res.json();
                msgDiv.innerText = result.message || result.error;
                if(res.ok) e.target.reset();
            } catch (err) {
                msgDiv.innerText = "Error sending message.";
            }
        });
    </script>
</body>
</html>
