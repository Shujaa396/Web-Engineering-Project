<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details – Black X Original</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --white: #ffffff;
      --black: #111111;
      --grey: #888888;
      --light-grey: #e8e7e3;
      --accent: #c8102e;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--black);
      font-size: 14px;
    }

    .topbar {
      background: var(--black);
      color: #fff;
      text-align: center;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 0;
    }

    nav {
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 40px;
      border-bottom: 1px solid var(--light-grey);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -1px;
      cursor: pointer;
    }

    .nav-logo:hover { color: var(--accent); }

    .nav-icons {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .nav-btn {
      background: #ffffff;
      border: 2px solid #d8d5cf;
      cursor: pointer;
      padding: 10px 22px;
      border-radius: 25px;
      transition: all 0.3s ease;
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      color: #333;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
    }

    .nav-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(200, 16, 46, 0.25);
    }

    .cart-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 40px; }

    .product-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 60px;
    }

    .product-images {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .main-image {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 8px;
      background: var(--white);
      border: 1px solid var(--light-grey);
    }

    .thumbnail-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .thumbnail {
      aspect-ratio: 1/1;
      object-fit: cover;
      cursor: pointer;
      border-radius: 6px;
      border: 2px solid var(--light-grey);
      transition: all 0.2s;
    }

    .thumbnail:hover,
    .thumbnail.active {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .product-info h1 {
      font-family: var(--font-display);
      font-size: 32px;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stars { color: #f5a623; font-size: 16px; }
    .reviews { color: var(--grey); font-size: 13px; }

    .pricing {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 24px;
      font-size: 24px;
      font-weight: 700;
    }

    .price-current { color: var(--black); }
    .price-original { text-decoration: line-through; color: var(--grey); font-size: 18px; font-weight: 400; }
    .discount-badge { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .size-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .size-btn {
      padding: 10px 16px;
      border: 2px solid var(--light-grey);
      background: var(--white);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }

    .size-btn:hover,
    .size-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .quantity-input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--light-grey);
      border-radius: 6px;
      font-size: 14px;
      max-width: 150px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 30px;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-add-cart {
      background: var(--white);
      border: 2px solid var(--black);
      color: var(--black);
    }

    .btn-add-cart:hover {
      background: var(--black);
      color: #fff;
    }

    .btn-order-cod {
      background: var(--black);
      color: #fff;
    }

    .btn-order-cod:hover {
      background: #333;
    }

    .btn-whatsapp {
      background: #25d366;
      color: #fff;
    }

    .btn-whatsapp:hover {
      background: #20ba5c;
    }

    .cart-confirm-popup {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 1000;
      width: min(420px, calc(100vw - 32px));
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 14px;
      align-items: center;
      padding: 16px;
      background: #111;
      color: #fff;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 10px;
      box-shadow: 0 22px 60px rgba(0,0,0,.35);
      animation: cartPopIn .22s ease both;
    }

    .cart-confirm-popup.closing { animation: cartPopOut .2s ease both; }

    .cart-confirm-close {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 28px;
      height: 28px;
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .cart-confirm-media {
      width: 86px;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 8px;
      background: #222;
    }

    .cart-confirm-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cart-confirm-copy { min-width: 0; padding-right: 20px; }
    .cart-confirm-kicker { color: #b7f7c3; font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; margin-bottom: 5px; }
    .cart-confirm-title { font-size: 15px; font-weight: 700; line-height: 1.25; margin-bottom: 5px; }
    .cart-confirm-meta { color: #cfcfcf; font-size: 12px; }

    .cart-confirm-actions {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .cart-confirm-actions button {
      min-height: 40px;
      border-radius: 6px;
      border: 1px solid #fff;
      cursor: pointer;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .cart-confirm-primary { background: #fff; color: #111; }
    .cart-confirm-secondary { background: transparent; color: #fff; }
    .cart-confirm-note {
      grid-column: 1 / -1;
      color: #d8d8d8;
      font-size: 12px;
      line-height: 1.5;
      margin-top: -2px;
    }

    @keyframes cartPopIn {
      from { opacity: 0; transform: translateY(18px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cartPopOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(18px) scale(.96); }
    }

    .product-details {
      background: var(--white);
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 60px;
    }

    .details-title {
      font-family: var(--font-display);
      font-size: 24px;
      margin-bottom: 20px;
    }

    .details-list {
      list-style: none;
    }

    .details-list li {
      padding: 10px 0;
      border-bottom: 1px solid var(--light-grey);
      font-size: 13px;
    }

    .details-list li:last-child {
      border-bottom: none;
    }

    .related-section {
      margin-top: 60px;
    }

    .related-title {
      font-family: var(--font-display);
      font-size: 28px;
      text-align: center;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .product-card {
      background: var(--white);
      cursor: pointer;
      transition: transform .25s, box-shadow .25s;
      position: relative;
      overflow: hidden;
      border-radius: 6px;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
    }

    .product-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
    }

    .product-info-card { padding: 14px; }
    .product-name { font-weight: 500; font-size: 13px; margin-bottom: 4px; }
    .product-price { font-weight: 700; font-size: 14px; }

    footer {
      background: #111;
      color: #aaa;
      padding: 50px 40px 24px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .product-section { grid-template-columns: 1fr; gap: 20px; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
      .thumbnail-grid { grid-template-columns: repeat(3, 1fr); }
      .cart-confirm-popup {
        right: 16px;
        bottom: 16px;
        grid-template-columns: 72px 1fr;
        padding: 14px;
      }
      .cart-confirm-media { width: 72px; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">Free Delivery on Orders Above Rs. 1999 | Easy Returns & Exchanges</div>

<!-- NAV -->
<nav>
  <div class="nav-logo" onclick="window.location.href='index.html'">Black X Original</div>
  <div class="nav-icons">
    <button class="nav-btn" onclick="window.location.href='index.html'" title="Back">←</button>
    <button id="search-btn" class="nav-btn" title="Search">🔍</button>
    <button id="profile-btn" class="nav-btn" title="Account">👤</button>
    <button id="cart-btn" class="nav-btn" title="Cart">🛒<span class="cart-badge" id="cart-count">0</span></button>
    <button id="admin-btn" class="nav-btn" title="Admin">⚙️</button>
  </div>
</nav>

<!-- CONTAINER -->
<div class="container">
  <!-- PRODUCT SECTION -->
  <div class="product-section">
    <!-- Images -->
    <div class="product-images">
      <img id="mainImage" class="main-image" src="" alt="Product Image">
      <div class="thumbnail-grid" id="thumbnailGrid"></div>
    </div>

    <!-- Info -->
    <div class="product-info">
      <h1 id="productName"></h1>
      
      <div class="rating">
        <span class="stars" id="rating">★★★★★</span>
        <span class="reviews" id="reviews">(0 reviews)</span>
      </div>

      <div class="pricing">
        <span class="price-current">Rs. <span id="productPrice">0</span></span>
        <span class="price-original" id="originalPrice"></span>
        <span class="discount-badge" id="discountBadge"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Size</label>
        <div class="size-options" id="sizeOptions">
          <button class="size-btn active" data-size="M">M</button>
          <button class="size-btn" data-size="L">L</button>
          <button class="size-btn" data-size="XL">XL</button>
          <button class="size-btn" data-size="XXL">XXL</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input type="number" id="quantity" class="quantity-input" min="1" value="1">
      </div>

      <div class="form-group">
        <label class="form-label" id="descriptionLabel">Specifications</label>
        <p id="productDescription" style="color: var(--grey); font-size: 13px; line-height: 1.6;"></p>
      </div>

      <div class="button-group">
        <button class="btn btn-add-cart" onclick="addToCart()">
          <span>🛒</span> Add to Cart
        </button>
        <button class="btn btn-order-cod" onclick="orderCOD()">
          📦 Order Now - Cash on Delivery
        </button>
        <button class="btn btn-whatsapp" onclick="orderWhatsApp()">
          💬 Buy on WhatsApp
        </button>
      </div>
    </div>
  </div>

  <!-- PRODUCT DETAILS -->
  <div class="product-details">
    <h3 class="details-title">Product Details</h3>
    <ul class="details-list" id="detailsList">
      <li>High quality product</li>
      <li>Premium fabric</li>
      <li>Easy maintenance</li>
    </ul>
  </div>

  <!-- RELATED PRODUCTS -->
  <div class="related-section">
    <h2 class="related-title">You May Also Like</h2>
    <div class="related-grid" id="relatedProducts"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>&copy; 2024 Black X Original. All Rights Reserved.</p>
</footer>

<script>
  const API_BASE = 'http://localhost:3000';
  let currentProduct = null;
  let selectedSize = 'M';

  // Get product ID from URL
  const urlParams = new URLSearchParams(window.location.search);
  const productId = urlParams.get('id');

  function formatPrice(amount) {
    const value = Number(amount) || 0;
    return `Rs. ${value.toLocaleString()}`;
  }

  // Load product details
  async function loadProduct() {
    try {
      const endpoint = productId ? `${API_BASE}/products/${productId}` : `${API_BASE}/products`;
      const response = await fetch(endpoint);
      const payload = await response.json();

      currentProduct = Array.isArray(payload) ? payload[0] : payload;
      
      if (!currentProduct) {
        document.querySelector('.product-section').innerHTML = '<p>Product not found</p>';
        return;
      }

      // Set main image
      const mainImage = document.getElementById('mainImage');
      mainImage.src = currentProduct.image || 'https://via.placeholder.com/400x500';
      mainImage.alt = currentProduct.name;

      // Set product info
      document.getElementById('productName').textContent = currentProduct.name;
      document.getElementById('productPrice').textContent = `Rs. ${Number(currentProduct.price || 0).toLocaleString()}`;
      document.getElementById('productDescription').textContent = currentProduct.description || 'Premium quality product';
      document.getElementById('reviews').textContent = `(${Number(currentProduct.reviews_count || 0)} reviews)`;
      document.getElementById('rating').textContent = '★'.repeat(Number(currentProduct.rating || 0)) + '☆'.repeat(5 - Number(currentProduct.rating || 0));

      const originalPrice = document.getElementById('originalPrice');
      const discountBadge = document.getElementById('discountBadge');
      originalPrice.textContent = currentProduct.original_price ? `Rs. ${Number(currentProduct.original_price).toLocaleString()}` : '';
      discountBadge.textContent = Number(currentProduct.is_out_of_stock || 0) === 1 ? 'OUT OF STOCK' : (currentProduct.badge || '');
      discountBadge.style.display = (currentProduct.badge || Number(currentProduct.is_out_of_stock || 0) === 1) ? 'inline-block' : 'none';

      // Set thumbnails (duplicate main image for now)
      const thumbnailGrid = document.getElementById('thumbnailGrid');
      thumbnailGrid.innerHTML = '';
      const imageList = [currentProduct.image, ...(currentProduct.extra_images ? currentProduct.extra_images.split(',').map(item => item.trim()).filter(Boolean) : [])].slice(0, 4);
      imageList.forEach((imageSrc, i) => {
        const thumb = document.createElement('img');
        thumb.src = imageSrc;
        thumb.alt = `Thumbnail ${i + 1}`;
        thumb.className = 'thumbnail' + (i === 0 ? ' active' : '');
        thumb.onclick = () => selectThumbnail(thumb);
        thumbnailGrid.appendChild(thumb);
      });

      updateCartCount();
    } catch (error) {
      console.error('Error loading product:', error);
    }
  }

  function selectThumbnail(thumb) {
    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
    thumb.classList.add('active');
    document.getElementById('mainImage').src = thumb.src;
  }

  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedSize = btn.dataset.size;
    });
  });

  function addToCart() {
    if (Number(currentProduct.is_out_of_stock || 0) === 1) {
      alert('This product is currently out of stock.');
      return false;
    }

    const quantity = parseInt(document.getElementById('quantity').value);
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    
    const item = {
      id: currentProduct.id || Date.now(),
      name: currentProduct.name,
      price: currentProduct.price,
      image: currentProduct.image,
      size: selectedSize,
      qty: quantity
    };

    const existing = cart.find(p => p.id === item.id && p.size === item.size);
    if (existing) {
      existing.qty = Number(existing.qty || 0) + quantity;
    } else {
      cart.push(item);
    }

    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    showAddToCartPopup(item);
    return true;
  }

  function showAddToCartPopup(item) {
    document.querySelector('.cart-confirm-popup')?.remove();

    const popup = document.createElement('div');
    popup.className = 'cart-confirm-popup';
    popup.innerHTML = `
      <button class="cart-confirm-close" type="button" aria-label="Close cart confirmation">&times;</button>
      <div class="cart-confirm-media">
        <img src="${item.image}" alt="${item.name}" />
      </div>
      <div class="cart-confirm-copy">
        <div class="cart-confirm-kicker">Added to bag</div>
        <div class="cart-confirm-title">${item.name}</div>
        <div class="cart-confirm-meta">Size ${item.size || '-'} · Qty ${item.qty} · ${formatPrice(item.price)}</div>
      </div>
      <div class="cart-confirm-actions">
        <button class="cart-confirm-primary" type="button">View Cart</button>
        <button class="cart-confirm-secondary" type="button">Continue</button>
      </div>
    `;

    document.body.appendChild(popup);

    const closePopup = () => popup.classList.add('closing');
    popup.querySelector('.cart-confirm-close').addEventListener('click', closePopup);
    popup.querySelector('.cart-confirm-secondary').addEventListener('click', closePopup);
    popup.querySelector('.cart-confirm-primary').addEventListener('click', () => {
      sessionStorage.setItem('openCart', '1');
      window.location.href = 'index.html';
    });
    popup.addEventListener('animationend', () => {
      if (popup.classList.contains('closing')) popup.remove();
    });

    setTimeout(closePopup, 4500);
  }

  function orderCOD() {
    if (!addToCart()) return;
    showCODPopup();
  }

  function showCODPopup() {
    document.querySelector('.cart-confirm-popup')?.remove();

    const popup = document.createElement('div');
    popup.className = 'cart-confirm-popup';
    popup.innerHTML = `
      <button class="cart-confirm-close" type="button" aria-label="Close COD confirmation">&times;</button>
      <div class="cart-confirm-media" style="display:flex;align-items:center;justify-content:center;font-size:34px;">
        COD
      </div>
      <div class="cart-confirm-copy">
        <div class="cart-confirm-kicker">Cash on delivery</div>
        <div class="cart-confirm-title">Order option selected</div>
        <div class="cart-confirm-meta">${currentProduct.name} · Size ${selectedSize}</div>
      </div>
      <div class="cart-confirm-note">Your item was added to the bag. Review your cart and proceed to checkout to place the order.</div>
      <div class="cart-confirm-actions">
        <button class="cart-confirm-primary" type="button">Go to Cart</button>
        <button class="cart-confirm-secondary" type="button">Continue</button>
      </div>
    `;

    document.body.appendChild(popup);

    const closePopup = () => popup.classList.add('closing');
    popup.querySelector('.cart-confirm-close').addEventListener('click', closePopup);
    popup.querySelector('.cart-confirm-secondary').addEventListener('click', closePopup);
    popup.querySelector('.cart-confirm-primary').addEventListener('click', () => {
      sessionStorage.setItem('openCart', '1');
      window.location.href = 'index.html';
    });
    popup.addEventListener('animationend', () => {
      if (popup.classList.contains('closing')) popup.remove();
    });

    setTimeout(closePopup, 5000);
  }

  function orderWhatsApp() {
    const message = `Hi, I'm interested in: ${currentProduct.name} (Size: ${selectedSize}, Qty: ${document.getElementById('quantity').value})`;
    const whatsappUrl = `https://wa.me/923001234567?text=${encodeURIComponent(message)}`;
    window.open(whatsappUrl, '_blank');
  }

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const count = cart.reduce((sum, item) => sum + Number(item.qty || item.quantity || 0), 0);
    document.getElementById('cart-count').textContent = count;
  }

  // Load related products
  async function loadRelated() {
    try {
      const response = await fetch(`${API_BASE}/products`);
      const products = await response.json();
      
      const related = products.slice(0, 4);
      const grid = document.getElementById('relatedProducts');
      
      related.forEach((product, index) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => window.location.href = `product-detail.html?id=${product.id}`;
        card.innerHTML = `
          <img class="product-img" src="${product.image}" alt="${product.name}">
          <div class="product-info-card">
            <div class="product-name">${product.name}</div>
            <div class="product-price">Rs. ${Number(product.price || 0).toLocaleString()}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    } catch (error) {
      console.error('Error loading related products:', error);
    }
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    loadProduct();
    loadRelated();

    document.getElementById('profile-btn')?.addEventListener('click', () => {
